  <circle cx="196" cy="355" r="18" fill="white" opacity="0.9"/>
  <circle cx="196" cy="355" r="9" fill="#1e40af"/>
  <circle cx="316" cy="355" r="18" fill="white" opacity="0.9"/>
  <circle cx="316" cy="355" r="9" fill="#1e40af"/>
  <!-- Rail -->
  <rect x="100" y="370" width="312" height="6" rx="3" fill="white" opacity="0.4"/>
